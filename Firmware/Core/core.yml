name: core
subscribe:
  - name: bms_status_north
  - name: bms_voltage_metrics_north

publish:
  - name: core_status
    id: 0x1
    signals:
      - name: core_state
        slice: 0 + 3
        unit:
          type: enum
          values:
            - STARTUP
            - IDLE
            - ACTIVE
            - FAULT
  - name: core_batt_ctrl
    id: 0x2
    signals:
      - name: batt_ctrl
        slice: 3 + 2
        unit:
          type: enum
          values:
            - NORTH
            - EAST
            - WEST
            - SOUTH
