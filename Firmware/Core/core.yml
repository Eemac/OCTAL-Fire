name: core
subscribe:
  - name: bms_status_n
  - name: bms_voltage_metrics_n
  - name: bms_status_e
  - name: bms_voltage_metrics_e
  - name: bms_status_s
  - name: bms_voltage_metrics_s
  - name: bms_status_w
  - name: bms_voltage_metrics_w

publish:
  - name: core_status
    id: 0x1
    signals:
      - name: core_state
        slice: 0 + 3
        unit:
          type: enum
          values:
            - STARTUP
            - IDLE
            - ACTIVE
            - FAULT
  - name: core_batt_ctrl
    id: 0x2
    signals:
      - name: north
        slice: 3 + 1
        unit:
          type: bool
      - name: east
        slice: 4 + 1
        unit:
          type: bool
      - name: west
        slice: 5 + 1
        unit:
          type: bool
      - name: south
        slice: 6 + 1
        unit:
          type: bool
