name: core
subscribe:
  - name: bms_status_a
  - name: bms_voltage_metrics_a

publish:
  - name: core_status
    id: 0x1
    signals:
      - name: core_state
        slice: 0 + 3
        unit:
          type: enum
          values:
            - STARTUP
            - IDLE
            - ACTIVE
            - FAULT
  - name: core_batt_ctrl
    id: 0x2
    signals:
      - name: north
        slice: 3 + 1
        unit:
          type: bool
      - name: east
        slice: 4 + 1
        unit:
          type: bool
      - name: west
        slice: 5 + 1
        unit:
          type: bool
      - name: south
        slice: 6 + 1
        unit:
          type: bool
