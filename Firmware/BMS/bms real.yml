name: bms_a
subscribe:
  - name: bms_status_b
    mob: 0
  - name: msg1
    mob: 0
  - name: bms_status_b_ex_e
    mob: 0

publish:
  - name: bms_status
    id: 0x10
    freq_hz: 100
    signals:
      - name: bms_state
        slice: 0 + 3
        unit:
          type: enum
          values:
            - CHARGING_IDLE
            - CHARGING_ACTIVE
            - BALANCING
            - ACTIVE
            - IDLE
            - FAULTED
            - SURVIVAL

      - name: bms_faults
        slice: 3 + 15
        unit:
          type: uint16_t
          name: ""
          # Bitfield definition:
          # 0  - CAN error
          # 1  - Loop timing overrun
          # 2  - ADBMS comms fault
          # 3  - ADBMS over temperature
          # 4  - Mux fault
          # 5  - Cell under temp
          # 6  - Cell over temp
          # 7  - Cell undervoltage
          # 8  - Cell overvoltage
          # 9  - Open wire
          # 10 - Current sense fault
          # 11 - Overcurrent
          # 12 - 3.3V brownout
          # 13 - 5V brownout
          # 14 - Charger comms fault
          # 15 - PEC error

      - name: pack_voltage
        slice: 18 + 16
        unit:
          type: uint16_t
          name: V

      - name: pack_current
        slice: 34 + 10
        unit:
          type: int16_t
          name: A

      - name: balancing_mask
        slice: 44 + 14
        unit:
          type: uint16_t
          name: mask


  - name: bms_temp_metrics
    id: 0x11
    freq_hz: 50
    signals:
      - name: max_current_cell_temp
        slice: 0 + 10
        unit:
          type: uint16_t
          name: C

      - name: min_current_cell_temp
        slice: 10 + 10
        unit:
          type: uint16_t
          name: C

      - name: max_cell_temp_ever
        slice: 20 + 10
        unit:
          type: uint16_t
          name: C

      - name: min_cell_temp_ever
        slice: 30 + 10
        unit:
          type: uint16_t
          name: C

      - name: temp_threshold_high
        slice: 40 + 10
        unit:
          type: uint16_t
          name: C

      - name: temp_threshold_low
        slice: 50 + 10
        unit:
          type: uint16_t
          name: C


  - name: bms_voltage_metrics
    id: 0x12
    freq_hz: 50
    signals:
      - name: max_cell_voltage
        slice: 0 + 12
        unit:
          type: uint16_t
          name: V

      - name: min_cell_voltage
        slice: 12 + 12
        unit:
          type: uint16_t
          name: V

      - name: voltage_threshold_high
        slice: 24 + 12
        unit:
          type: uint16_t
          name: V

      - name: voltage_threshold_low
        slice: 36 + 12
        unit:
          type: uint16_t
          name: V

      - name: charger_target_voltage
        slice: 48 + 12
        unit:
          type: uint16_t
          name: V


  - name: cell_voltages_0
    id: 0x13
    freq_hz: 20
    signals:
      - name: cell_1
        slice: 0 + 12
      - name: cell_2
        slice: 12 + 12
      - name: cell_3
        slice: 24 + 12
      - name: cell_4
        slice: 36 + 12
      - name: cell_5
        slice: 48 + 12


  - name: cell_voltages_1
    id: 0x14
    freq_hz: 20
    signals:
      - name: cell_6
        slice: 0 + 12
      - name: cell_7
        slice: 12 + 12
      - name: cell_8
        slice: 24 + 12
      - name: cell_9
        slice: 36 + 12
      - name: cell_10
        slice: 48 + 12


  - name: cell_voltages_2
    id: 0x15
    freq_hz: 20
    signals:
      - name: cell_11
        slice: 0 + 12
      - name: cell_12
        slice: 12 + 12
      - name: cell_13
        slice: 24 + 12
      - name: cell_14
        slice: 36 + 12


  - name: thermistors_0
    id: 0x16
    freq_hz: 10
    signals:
      - name: thermistor_1
        slice: 0 + 10
      - name: thermistor_2
        slice: 10 + 10
      - name: thermistor_3
        slice: 20 + 10
      - name: thermistor_4
        slice: 30 + 10
      - name: thermistor_5
        slice: 40 + 10
      - name: thermistor_6
        slice: 50 + 10


  - name: thermistors_1
