name: bms_a
subscribe:

publish:
  - name: bms_status_a
    id: 0x10
    signals:
      - name: bms_state
        slice: 0 + 3
        unit:
          type: enum
          values:
            - CHARGING_IDLE
            - CHARGING_ACTIVE
            - BALANCING
            - ACTIVE
            - IDLE
            - FAULTED
            - SURVIVAL

      - name: bms_faults
        slice: 3 + 15
        unit:
          type: uint16_t
          name: faults
          # Bitfield definition:
          # 0  - CAN error
          # 1  - Loop timing overrun
          # 2  - ADBMS comms fault
          # 3  - ADBMS die over temperature
          # 4  - ADBMS PEC Error
          # 5  - Mux fault
          # 6  - Cell under temp
          # 7  - Cell over temp
          # 8  - Cell undervoltage
          # 9  - Cell overvoltage
          # 10 - Open wire
          # 11 - Current sense fault
          # 12 - Overcurrent
          # 13 - 3.3V brownout
          # 14 - 5V brownout

      - name: pack_voltage
        slice: 18 + 16
        unit:
          type: uint16_t
          name: 0.1V
          minimum: 0
          maximum: 700

      - name: pack_current
        slice: 34 + 10
        unit:
          type: int16_t
          name: A
          minimum: -511
          maximum: 511

      - name: balancing_mask
        slice: 44 + 14
        unit:
          type: uint16_t
          name: bitmask
          # Bit is set to 1 if that cell is currently balancing, 0 if not


  - name: bms_temp_metrics_a
    id: 0x11
    signals:
      - name: max_current_cell_temp
        slice: 0 + 10
        unit:
          type: int16_t
          name: C
          minimum: -20
          maximum: 120

      - name: min_current_cell_temp
        slice: 10 + 10
        unit:
          type: int16_t
          name: C
          minimum: -20
          maximum: 120

      - name: max_cell_temp_ever
        slice: 20 + 10
        unit:
          type: int16_t
          name: C
          minimum: -20
          maximum: 120

      - name: min_cell_temp_ever
        slice: 30 + 10
        unit:
          type: int16_t
          name: C
          minimum: -20
          maximum: 120

      - name: temp_threshold_high
        slice: 40 + 10
        unit:
          type: int16_t
          name: C
          minimum: -20
          maximum: 120

      - name: temp_threshold_low
        slice: 50 + 10
        unit:
          type: int16_t
          name: C
          minimum: -20
          maximum: 120


  - name: bms_voltage_metrics_a
    id: 0x12
