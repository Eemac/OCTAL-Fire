          minimum: 0
          maximum: 5

      - name: cell_voltage_threshold_low
        slice: 36 + 12
        unit:
          type: uint16_t
          name: V
          minimum: 0
          maximum: 5

      - name: charger_target_voltage
        slice: 48 + 12
        unit:
          type: uint16_t
          name: V
          minimum: 0
          maximum: 70


