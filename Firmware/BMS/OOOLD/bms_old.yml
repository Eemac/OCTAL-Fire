name: bms_a
subscribe:
  - name: bms_status_b
    mob: 0
  - name: msg1
    mob: 0
  - name: bms_status_b_ex_e
    mob: 0

publish:
  - name: thrust
  - name: thrust2
  - name: bms_status
    id: 0x1000
    freq_hz: 100
    signals:
      - name: bms_state
        slice: 0 + 2
        unit:
          type: enum
          values:
            - ACTIVE
            - CHARGING
            - FAULT
      - name: bms_fault_code
        slice: 2 + 16
        unit:
          type: uint16_t
          name: ""
          # See fault.h for full documentation of faults. Faults are listed
          # here for convenience.
          # - NONE
          # - (UV)  UNDERVOLTAGE
          # - (OV)  OVERVOLTAGE
          # - (UT)  UNDERTEMPERATURE
          # - (OT)  OVERTEMPERATURE
          # - (DF)  DIAGNOSTICS_FAIL
          # - (OW)  OPEN_WIRE
          # - (OC)  OVERCURRENT
          # - (PEC) PEC
          # - (CF)  CHARGER_FAULT
          # - (SM)  STATE_MACHINE
          # - (CSC) CSC_MIA
          # - (MUX) MUX_MIA
          # - (DOT) DIE_OVERTEMPERATURE
      - name: pack_voltage
        slice: 18 + 16
        unit:
          type: uint16_t
          name: V
      - name: pack_current
        slice: 34 + 12
        unit:
          type: int16_t
          name: A
      - name: cell_balancing_status
        slice: 46 + 1
        unit:
          type: bool
      - name: regen_enabled
        slice: 47 + 1
        unit:
          type: bool
      - name: overcurrent_detect
        slice: 48 + 1
        unit:
          type: bool
